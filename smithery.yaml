# Smithery Registry Manifest — Feedback Synthesis MCP
# https://smithery.ai/server/feedback-synthesis-mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      evmPrivateKey:
        type: string
        description: "EVM wallet private key for x402 micropayment signing (wallet with USDC on Base mainnet)"
    required: []
  commandFunction: |-
    (config) => ({
      command: "feedback-synthesis-mcp",
      args: [],
      env: {
        EVM_PRIVATE_KEY: config.evmPrivateKey || ""
      }
    })

# ── Metadata ─────────────────────────────────────────────────────────────────
name: feedback-synthesis-mcp
version: "0.1.0"
description: |
  Customer feedback intelligence MCP. Synthesize GitHub Issues, Hacker News,
  and App Store reviews into ranked pain clusters with evidence links and
  suggested actions. Pay-per-call via x402 micropayments — no signup required.

author: Cortex Labs
homepage: https://pypi.org/project/feedback-synthesis-mcp/
repository: https://github.com/sapph1re/feedback-synthesis-mcp
license: MIT
category: Developer Tools

keywords:
  - feedback
  - customer-intelligence
  - product-analytics
  - pain-points
  - github-issues
  - hacker-news
  - app-store
  - x402
  - micropayments

# ── Tools ────────────────────────────────────────────────────────────────────
tools:
  - name: synthesize_feedback
    description: |
      Synthesize customer feedback from GitHub Issues, Hacker News, and/or
      App Store Reviews into ranked pain clusters. Multi-source, multi-pass
      LLM pipeline. Returns up to 10 clusters with impact scores, evidence
      links, and suggested actions. $0.05/call via x402.
    inputSchema:
      type: object
      properties:
        sources:
          type: array
          description: |
            List of source specs. Each has 'type' (github_issues/hackernews/appstore)
            and 'target' (owner/repo, search query, or app bundle ID).
          items:
            type: object
        max_items_per_source:
          type: integer
          description: Max items to collect per source (default 200)
          default: 200
        since:
          type: string
          description: ISO 8601 datetime filter (e.g. '2026-01-01T00:00:00Z')
        focus:
          type: string
          description: Analysis focus — 'pain_points' or 'feature_requests'
          default: pain_points
      required: [sources]

  - name: get_pain_points
    description: |
      Quickly extract top pain points from a single feedback source.
      Single LLM pass — faster and cheaper than synthesize_feedback.
      $0.02/call via x402.
    inputSchema:
      type: object
      properties:
        source:
          type: object
          description: Source spec with 'type' and 'target'
        max_items:
          type: integer
          description: Max items to collect (default 100)
          default: 100
        top_n:
          type: integer
          description: Number of top pain points to return (default 5)
          default: 5
      required: [source]

  - name: search_feedback
    description: |
      Full-text search across cached feedback items. No LLM processing —
      searches previously collected data. Fast and cheap. $0.01/call via x402.
    inputSchema:
      type: object
      properties:
        query:
          type: string
          description: Search terms (e.g. 'authentication mobile')
        sources:
          type: array
          description: Filter by source types
          items:
            type: string
        target:
          type: string
          description: Filter by target repo/app
        since:
          type: string
          description: ISO 8601 datetime filter
        limit:
          type: integer
          description: Max results (default 20)
          default: 20
      required: [query]

  - name: get_sentiment_trends
    description: |
      Time-series sentiment analysis across feedback sources. Shows how
      sentiment shifts over time — useful for tracking release impact.
      Returns weekly/monthly sentiment scores with notable shifts. $0.03/call.
    inputSchema:
      type: object
      properties:
        sources:
          type: array
          description: List of source specs (same format as synthesize_feedback)
          items:
            type: object
        since:
          type: string
          description: Start date for trend analysis (ISO 8601)
          default: "2025-10-01T00:00:00Z"
        granularity:
          type: string
          description: Time bucket size — 'weekly' or 'monthly'
          default: weekly
      required: [sources]

# ── Pricing ──────────────────────────────────────────────────────────────────
pricing:
  model: per-call
  currency: USD
  tiers:
    - name: Pay-per-call (x402)
      description: |
        No signup. Any agent can pay automatically via x402 protocol (USDC on Base).
        synthesize_feedback $0.05, get_pain_points $0.02, search_feedback $0.01,
        get_sentiment_trends $0.03.
